name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: resolvehub
          POSTGRES_USER: resolvehub
          POSTGRES_PASSWORD: resolvehub
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U resolvehub"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: ./mvnw verify -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5433/resolvehub
          SPRING_DATASOURCE_USERNAME: resolvehub
          SPRING_DATASOURCE_PASSWORD: resolvehub
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Build JAR
        run: ./mvnw package -DskipTests -B

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t resolvehub:${{ github.sha }} .
