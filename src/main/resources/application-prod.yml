# Production profile — activated by SPRING_PROFILES_ACTIVE=prod
#
# Railway variable setup (do this once in Railway Variables → Raw Editor):
#
#   PGHOST=${{Postgres.PGHOST}}
#   PGPORT=${{Postgres.PGPORT}}
#   PGDATABASE=${{Postgres.PGDATABASE}}
#   PGUSER=${{Postgres.PGUSER}}
#   PGPASSWORD=${{Postgres.PGPASSWORD}}
#   REDISHOST=${{Redis.REDISHOST}}
#   REDISPORT=${{Redis.REDISPORT}}
#   REDISPASSWORD=${{Redis.REDISPASSWORD}}

spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000

  data:
    redis:
      host: ${REDISHOST:localhost}
      port: ${REDISPORT:6379}
      password: ${REDISPASSWORD:}
      timeout: 2000ms

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

server:
  port: ${PORT:8080}
