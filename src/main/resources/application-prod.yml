# Production profile — all sensitive values come from environment variables
# Set SPRING_PROFILES_ACTIVE=prod to activate

spring:
  # Railway DATABASE_URL format: postgresql://user:pass@host:port/db
  # We prepend "jdbc:" to make it a valid JDBC URL for HikariCP
  datasource:
    url: jdbc:${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000

  data:
    redis:
      # Railway REDIS_URL format: redis://default:pass@host:port
      url: ${REDIS_URL}
      timeout: 2000ms

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"

  # Mail is completely disabled unless MAIL_HOST is explicitly provided
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

server:
  port: ${PORT:8080}
