# Production profile
# Railway automatically injects PGHOST, PGPORT, PGUSER, PGPASSWORD, PGDATABASE
# from the linked Postgres service — no manual DATABASE_URL needed.

spring:
  datasource:
    # Use individual PG* variables (always injected by Railway — no format ambiguity)
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000

  data:
    redis:
      # Railway injects REDISHOST, REDISPORT, REDISPASSWORD from linked Redis service
      host: ${REDISHOST}
      port: ${REDISPORT:6379}
      password: ${REDISPASSWORD:}
      timeout: 2000ms

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"

  # Disable mail autoconfiguration — app works without SMTP config
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

server:
  port: ${PORT:8080}
